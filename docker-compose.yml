services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - milvus-etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - milvus-minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.6.0
    command: ['milvus', 'run', 'standalone']
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - '19530:19530'
      - '9091:9091'
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  redis:
    image: redis:8.0-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']

  mastra:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4111:4111'
    env_file:
      - .env
    environment:
      MILVUS_ADDRESS: milvus:19530
      REDIS_URL: redis://redis:6379
    depends_on:
      - milvus
      - redis

  python-agent:
    build:
      context: ../my-first-agent-langgraph
      dockerfile: Dockerfile
    ports:
      - '8011:8011'
    environment:
      APP_ENV: docker
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      MODEL_NAME: ${MODEL_NAME:-mock/interview-runtime}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-90}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-2}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.2}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MILVUS_ADDRESS: http://milvus:19530
      CHECKPOINT_URL: /data/checkpoints.db
      OUTCOME_ROOT: /app/Interview outcome
      RAG_LOG_ROOT: /app/RAG LOG INFO
    volumes:
      - python-agent-data:/data
      - './Interview outcome:/app/Interview outcome'
      - './RAG LOG INFO:/app/RAG LOG INFO'
    depends_on:
      - milvus

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      AGENT_RUNTIME_PROVIDER: ${AGENT_RUNTIME_PROVIDER:-python}
      MASTRA_BASE_URL: http://mastra:4111
      PY_AGENT_BASE_URL: http://python-agent:8011
      RESUME_MAX_FILE_SIZE_BYTES: 2097152
      DEMO_USERNAME: demo
      DEMO_PASSWORD: demo123
    depends_on:
      - mastra
      - python-agent

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - bff

volumes:
  milvus-etcd:
  milvus-minio:
  milvus-data:
  redis-data:
  python-agent-data:
